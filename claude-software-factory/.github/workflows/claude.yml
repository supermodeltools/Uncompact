# Claude Code — Core Implementation Trigger
#
# This is the main entry point for Claude Code. When someone mentions @claude
# in an issue comment, PR comment, or review, this workflow spins up Claude Code
# to read the context and take action (implement features, fix bugs, respond).
#
# It also triggers when issues are opened or assigned, allowing the auto-assign
# workflow to chain into this one.

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Only run if the event mentions @claude or is an issue being opened/assigned
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (github.event.action == 'opened' || github.event.action == 'assigned'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: |
            Bash(gh pr create *)
            Bash(gh pr list *)
            Bash(gh pr view *)
            Bash(gh issue list *)
            Bash(gh issue view *)
            Bash(gh issue comment *)
            Bash(git fetch *)
            Bash(git checkout *)
            Bash(git checkout -b *)
            Bash(git add *)
            Bash(git commit *)
            Bash(git push *)
            Bash(git rebase *)
            Bash(git log *)
            Bash(git diff *)
            Bash(git status)
            Edit
            Write
            Read
            Glob
            Grep
          # CUSTOMIZE: Add your build, lint, and test commands below:
          # Bash(your-build-command)
          # Bash(your-lint-command)
          # Bash(your-test-command)
          allowed_bots: "claude[bot]"
